services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: poketeam
      POSTGRES_USER: poketeam
      POSTGRES_PASSWORD: poketeam
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poketeam -d poketeam"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://poketeam:poketeam@db:5432/poketeam
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NEXT_PUBLIC_SPRITE_CDN: play.pokemonshowdown.com
    depends_on:
      db:
        condition: service_healthy

  # One-off service to run migrations and seed the database
  seed:
    build:
      context: .
      dockerfile: Dockerfile.seed
    environment:
      DATABASE_URL: postgres://poketeam:poketeam@db:5432/poketeam
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - setup

volumes:
  pgdata:
